<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0d0f18"/>
  <!-- Subtle radial glow -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>
  <!-- Chip outline -->
  <rect x="136" y="136" width="240" height="240" rx="24" fill="none" stroke="#00e5ff" stroke-width="8"/>
  <!-- Chip pins - top -->
  <line x1="196" y1="136" x2="196" y2="96" stroke="#00e5ff" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="136" x2="256" y2="96" stroke="#00e5ff" stroke-width="6" stroke-linecap="round"/>
  <line x1="316" y1="136" x2="316" y2="96" stroke="#00e5ff" stroke-width="6" stroke-linecap="round"/>
  <!-- Chip pins - bottom -->
  <line x1="196" y1="376" x2="196" y2="416" stroke="#00e5ff" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="376" x2="256" y2="416" stroke="#00e5ff" stroke-width="6" stroke-linecap="round"/>
  <line x1="316" y1="376" x2="316" y2="416" stroke="#00e5ff" stroke-width="6" stroke-linecap="round"/>
  <!-- Chip pins - left -->
  <line x1="136" y1="196" x2="96" y2="196" stroke="#00e5ff" stroke-width="6" stroke-linecap="round"/>
  <line x1="136" y1="256" x2="96" y2="256" stroke="#00e5ff" stroke-width="6" stroke-linecap="round"/>
  <line x1="136" y1="316" x2="96" y2="316" stroke="#00e5ff" stroke-width="6" stroke-linecap="round"/>
  <!-- Chip pins - right -->
  <line x1="376" y1="196" x2="416" y2="196" stroke="#00e5ff" stroke-width="6" stroke-linecap="round"/>
  <line x1="376" y1="256" x2="416" y2="256" stroke="#00e5ff" stroke-width="6" stroke-linecap="round"/>
  <line x1="376" y1="316" x2="416" y2="316" stroke="#00e5ff" stroke-width="6" stroke-linecap="round"/>
  <!-- Neural net nodes - center pattern -->
  <!-- Central node -->
  <circle cx="256" cy="256" r="16" fill="#00e5ff"/>
  <!-- Inner ring nodes -->
  <circle cx="206" cy="206" r="10" fill="#00e5ff" opacity="0.8"/>
  <circle cx="306" cy="206" r="10" fill="#00e5ff" opacity="0.8"/>
  <circle cx="206" cy="306" r="10" fill="#00e5ff" opacity="0.8"/>
  <circle cx="306" cy="306" r="10" fill="#00e5ff" opacity="0.8"/>
  <!-- Connections from center to inner ring -->
  <line x1="256" y1="256" x2="206" y2="206" stroke="#00e5ff" stroke-width="3" opacity="0.5"/>
  <line x1="256" y1="256" x2="306" y2="206" stroke="#00e5ff" stroke-width="3" opacity="0.5"/>
  <line x1="256" y1="256" x2="206" y2="306" stroke="#00e5ff" stroke-width="3" opacity="0.5"/>
  <line x1="256" y1="256" x2="306" y2="306" stroke="#00e5ff" stroke-width="3" opacity="0.5"/>
  <!-- Cross connections -->
  <line x1="206" y1="206" x2="306" y2="206" stroke="#00e5ff" stroke-width="2" opacity="0.3"/>
  <line x1="306" y1="206" x2="306" y2="306" stroke="#00e5ff" stroke-width="2" opacity="0.3"/>
  <line x1="306" y1="306" x2="206" y2="306" stroke="#00e5ff" stroke-width="2" opacity="0.3"/>
  <line x1="206" y1="306" x2="206" y2="206" stroke="#00e5ff" stroke-width="2" opacity="0.3"/>
</svg>
